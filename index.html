<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>WordlySparrow</title>
    <link rel="stylesheet" href="style.css">
    <script src="https://kit.fontawesome.com/6ae23c62b1.js" crossorigin="anonymous"></script>
</head>

<body>
    <div class="container">
        <div class="header">
            <div class="logo">
                <i class="fa-solid fa-book-open"></i>
                <span>WordlySparrow</span>
            </div>
            <div class="searchdic">
                <i class="fa-solid fa-magnifying-glass"></i>
                <input id="searchI" placeholder="type any word to search...">
            </div>
            <div class="searchdic1"id="searchB">
                <i class="fa-solid fa-magnifying-glass"></i>
                <p>Dicover Words</p>
            </div>
            <div class="themechange">
                <i class="fa-solid fa-moon"></i>
                <p>Dark Mode</p>
            </div>
        </div>
        <div class="boxcont">
            <div class="results">
                <h1>Your Searched Word</h1>
                <div class="resultsearch"></div>
            </div>
            <div class="favourites">
                <h1>Your Favourite Words</h1>
                <div class="favouritelist"></div>
            </div>
        </div>
    </div>
</body>
<script src="index.js"></script>

</html>
